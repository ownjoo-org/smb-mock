volumes:
  keytab:

services:

  # ── Kerberos KDC ──────────────────────────────────────────────────────────
  kdc:
    image: speedimusmaximus/mock-kdc:${SMB_MOCK_VERSION:-latest}
    build:
      context: docker/kdc
    hostname: kdc
    environment:
      KRB5_REALM:           ${KRB5_REALM:-SMBTEST.LOCAL}
      KRB5_ADMIN_PASSWORD:  ${KRB5_ADMIN_PASSWORD:-adminpass}
      SMB_HOSTNAME:         ${SMB_HOSTNAME:-smbserver.smbtest.local}
      SMB_USER_0:           ${SMB_USER_0:-testuser:testpass}
      # SMB_USER_1: alice:alicepass   # add more users as needed
      # SMB_TRUST_0: CORP.EXAMPLE.COM:kdc.corp.example.com:sharedsecret:one-way
    volumes:
      - keytab:/shared
    ports:
      - "${KDC_PORT:-88}:88/tcp"
      - "${KDC_PORT:-88}:88/udp"
    # 749 (kadmind) intentionally NOT exposed — stays inside Docker network only
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE   # krb5kdc needs port 88
      - CHOWN              # entrypoint owns /shared
      - SETUID
      - SETGID
      - DAC_OVERRIDE       # write config files
    security_opt:
      - no-new-privileges:true
    pids_limit: 100
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M

  # ── Samba file server ─────────────────────────────────────────────────────
  samba:
    image: speedimusmaximus/mock-smb:${SMB_MOCK_VERSION:-latest}
    build:
      context: docker/samba
    hostname: ${SMB_HOSTNAME:-smbserver.smbtest.local}
    environment:
      SMB_HOSTNAME:         ${SMB_HOSTNAME:-smbserver.smbtest.local}
      SMB_WORKGROUP:        ${SMB_WORKGROUP:-SMBTEST}
      KRB5_REALM:           ${KRB5_REALM:-SMBTEST.LOCAL}
      KDC_HOST:             kdc
      SMB_ENABLE_ANONYMOUS: ${SMB_ENABLE_ANONYMOUS:-true}
      SMB_ENABLE_NTLM:      ${SMB_ENABLE_NTLM:-true}
      SMB_ENABLE_KERBEROS:  ${SMB_ENABLE_KERBEROS:-true}
      SMB_USER_0:           ${SMB_USER_0:-testuser:testpass}
      SMB_SHARE_0:          ${SMB_SHARE_0:-testshare:/smb-data/testshare:rw}
      SMB_SHARE_1:          ${SMB_SHARE_1:-readonly:/smb-data/readonly:ro}
      # SMB_TRUST_0: CORP.EXAMPLE.COM:kdc.corp.example.com:sharedsecret:one-way
    volumes:
      - keytab:/shared
    ports:
      - "${SMB_PORT:-445}:445/tcp"
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE   # smbd needs port 445
      - CHOWN              # entrypoint creates users / sets ownership
      - SETUID
      - SETGID
      - DAC_OVERRIDE       # write config files, set passwords
    security_opt:
      - no-new-privileges:true
    pids_limit: 200
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 512M
    depends_on:
      kdc:
        condition: service_healthy
