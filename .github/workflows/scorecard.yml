name: Scorecard

on:
  push:
    branches: ["main"]
  schedule:
    - cron: "30 1 * * 1"  # weekly Monday 01:30 UTC

# Explicit read-only permissions — scorecard requires contents:read, actions:read
permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write  # upload SARIF to GitHub Security tab
      id-token: write         # keyless OIDC publishing to OpenSSF
      contents: read
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false

      - name: Run OSSF Scorecard analysis
        uses: ossf/scorecard-action@v2.4.0
        with:
          results_file: scorecard.sarif
          results_format: sarif
          publish_results: true  # publishes to https://securityscorecards.dev

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@7fd177fa680c9881b53cdab4d346d32574c9f7f4  # v3
        with:
          sarif_file: scorecard.sarif
