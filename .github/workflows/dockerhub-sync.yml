name: Sync README to Docker Hub

on:
  push:
    branches: ["main"]
    paths:
      - "README.md"
  workflow_dispatch:  # manual trigger from GitHub Actions UI

jobs:
  sync:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - image: speedimusmaximus/mock-kdc
            short_desc: "MIT Kerberos KDC for SMB/CIFS integration testing — no Windows DC required"
          - image: speedimusmaximus/mock-smb
            short_desc: "Samba SMB2/3 file server for integration testing — pairs with mock-kdc"

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Push README to Docker Hub — ${{ matrix.image }}
        uses: peter-evans/dockerhub-description@dc67fad7001ef9e8e3c124cb7a64e16d0a63d864  # v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ matrix.image }}
          short-description: ${{ matrix.short_desc }}
          readme-filepath: ./README.md
