name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.11"

      - name: Install Kerberos system libraries
        run: sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends libkrb5-dev

      - name: Install test dependencies
        run: pip install -r requirements-test.txt

      - name: Run unit tests with coverage
        run: |
          python -m pytest tests/unit/ -q \
            --cov=docker/kdc --cov=docker/samba --cov=cli \
            --cov-report=term-missing

      - name: Bandit — Python security linter
        run: |
          pip install bandit[toml] --quiet
          bandit -r docker/ cli/ -ll -q

  lint-dockerfiles:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dockerfile:
          - docker/kdc/Dockerfile
          - docker/samba/Dockerfile
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Hadolint — ${{ matrix.dockerfile }}
        uses: hadolint/hadolint-action@54c9adbab1582c2ef04b2016b760714a4bfde3cf  # v3.1.0
        with:
          dockerfile: ${{ matrix.dockerfile }}
          failure-threshold: warning

  checkov:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Checkov — IaC security scan
        uses: bridgecrewio/checkov-action@4048c972aae68d0b983a48bb3479aab2d877b898  # v12
        with:
          directory: .
          framework: dockerfile,yaml
          soft_fail: false
          output_format: cli
          # CKV_DOCKER_2: HEALTHCHECK already present; false positive on wolfi-base
          # CKV_DOCKER_3: krb5kdc and smbd are system daemons that require root; USER instruction not viable
          # CKV_DOCKER_7: cgr.dev/chainguard/wolfi-base is rolling; Chainguard's own guidance is to use :latest and rely on daily CVE rebuilds
          skip_check: CKV_DOCKER_2,CKV_DOCKER_3,CKV_DOCKER_7

  dockle:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: kdc
            context: docker/kdc
          - service: samba
            context: docker/samba
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Build image for scanning
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8  # v6
        with:
          context: ${{ matrix.context }}
          push: false
          load: true
          tags: smb-mock-${{ matrix.service }}:dockle

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3

      - name: Dockle — CIS benchmark lint (${{ matrix.service }})
        run: |
          VERSION=$(curl -s https://api.github.com/repos/goodwithtech/dockle/releases/latest | grep '"tag_name":' | cut -d'"' -f4 | sed 's/v//')
          curl -sSL "https://github.com/goodwithtech/dockle/releases/download/v${VERSION}/dockle_${VERSION}_Linux-64bit.tar.gz" | tar -xz
          ./dockle --exit-code 1 --exit-level warn smb-mock-${{ matrix.service }}:dockle
