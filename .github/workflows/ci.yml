name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: pip install -r requirements-test.txt

      - name: Run unit tests with coverage
        run: |
          python -m pytest tests/unit/ -q \
            --cov=docker/kdc --cov=docker/samba --cov=cli \
            --cov-report=term-missing --cov-fail-under=70

      - name: Bandit — Python security linter
        run: |
          pip install bandit[toml] --quiet
          bandit -r docker/ cli/ -ll -q

  lint-dockerfiles:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dockerfile:
          - docker/kdc/Dockerfile
          - docker/samba/Dockerfile
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Hadolint — ${{ matrix.dockerfile }}
        uses: hadolint/hadolint-action@54c9adbab1582c2ef04b2016b760714a4bfde3cf  # v3.1.0
        with:
          dockerfile: ${{ matrix.dockerfile }}
          failure-threshold: warning

  checkov:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Checkov — IaC security scan
        uses: bridgecrewio/checkov-action@4048c972aae68d0b983a48bb3479aab2d877b898  # v12
        with:
          directory: .
          framework: dockerfile,docker_compose
          soft_fail: false
          output_format: cli
          skip_check: CKV_DOCKER_2  # HEALTHCHECK already present; false positive on wolfi-base

  dockle:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: kdc
            context: docker/kdc
          - service: samba
            context: docker/samba
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Build image for scanning
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8  # v6
        with:
          context: ${{ matrix.context }}
          push: false
          load: true
          tags: smb-mock-${{ matrix.service }}:dockle

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3

      - name: Dockle — CIS benchmark lint (${{ matrix.service }})
        run: |
          VERSION=$(curl -s https://api.github.com/repos/goodwithtech/dockle/releases/latest | grep '"tag_name":' | cut -d'"' -f4 | sed 's/v//')
          curl -sSL "https://github.com/goodwithtech/dockle/releases/download/v${VERSION}/dockle_${VERSION}_Linux-64bit.tar.gz" | tar -xz
          ./dockle --exit-code 1 --exit-level warn smb-mock-${{ matrix.service }}:dockle
