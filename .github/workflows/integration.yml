name: Integration tests

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  integration:
    name: Integration tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.11"

      - name: Install Kerberos system libraries
        run: sudo apt-get install -y --no-install-recommends libkrb5-dev

      - name: Install test dependencies
        run: pip install -r requirements-test.txt

      - name: Add hosts entry for Kerberos FQDN resolution
        run: echo "127.0.0.1  smbserver.smbtest.local" | sudo tee -a /etc/hosts

      - name: Build and start stack
        run: docker compose up --build -d
        env:
          SMB_PORT: "4450"
          KDC_PORT: "8800"
          SMB_LOG_LEVEL: "3"

      - name: Wait for stack to be healthy
        run: |
          echo "Waiting for KDC (port 8800)..."
          timeout 120 bash -c 'until nc -z 127.0.0.1 8800; do sleep 2; done'
          echo "Waiting for SMB (port 4450)..."
          timeout 60 bash -c 'until nc -z 127.0.0.1 4450; do sleep 2; done'
          echo "Grace period for smbd to finish initialising..."
          sleep 5

      - name: Run integration tests
        run: python -m pytest tests/integration/ -v --timeout=120
        env:
          SMB_SKIP_COMPOSE: "1"
          SMB_PORT: "4450"
          KDC_PORT: "8800"

      - name: Dump container logs on failure
        if: failure()
        run: |
          docker compose logs kdc
          docker compose logs samba
          echo "=== /var/log/samba/ contents ==="
          docker exec smb-mock-samba-1 ls /var/log/samba/ || true
          echo "=== all samba logs ==="
          docker exec smb-mock-samba-1 sh -c 'for f in /var/log/samba/log.*; do echo "--- $f ---"; cat "$f"; done' || echo "(no samba log files)"
        env:
          SMB_PORT: "4450"
          KDC_PORT: "8800"
          SMB_LOG_LEVEL: "3"

      - name: Tear down stack
        if: always()
        run: docker compose down -v
        env:
          SMB_PORT: "4450"
          KDC_PORT: "8800"
