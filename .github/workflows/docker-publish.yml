name: Build and publish Docker images

on:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # attach SBOM to GitHub releases on tags
      id-token: write       # keyless cosign OIDC signing
      attestations: write   # GitHub build provenance attestations

    strategy:
      matrix:
        include:
          - service: kdc
            context: docker/kdc
            image: speedimusmaximus/mock-kdc
          - service: samba
            context: docker/samba
            image: speedimusmaximus/mock-smb

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051  # v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Log in to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130  # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3

      - name: Build and push ${{ matrix.service }}
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8  # v6
        with:
          context: ${{ matrix.context }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

      - name: Install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac  # v3

      - name: Sign image (keyless via GitHub OIDC)
        run: |
          cosign sign --yes "${{ matrix.image }}@${{ steps.build.outputs.digest }}"

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610  # v0
        with:
          image: ${{ matrix.image }}@${{ steps.build.outputs.digest }}
          artifact-name: sbom-${{ matrix.service }}.spdx.json
          output-file: /tmp/sbom-${{ matrix.service }}.spdx.json
          upload-release-assets: ${{ startsWith(github.ref, 'refs/tags/') }}

      - name: Attach SBOM to image as OCI artifact
        run: |
          cosign attach sbom \
            --sbom /tmp/sbom-${{ matrix.service }}.spdx.json \
            "${{ matrix.image }}@${{ steps.build.outputs.digest }}"

      - name: GitHub build provenance attestation
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be  # v2
        with:
          subject-name: ${{ matrix.image }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
